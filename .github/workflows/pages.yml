name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  YARN_NPM_REGISTRY_SERVER: https://registry.npmjs.org

jobs:
  deploy:
    name: Build and deploy examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: printf 'y\n' | NPQ_PKG_MGR=yarn npx --yes npq install
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build library
        run: yarn workspace @wix/htmdx build:library

      - name: Build Storybook
        run: yarn workspace @wix/htmdx build-storybook

      - name: Assemble site
        run: |
          mkdir -p site
          cp examples/*.html site/
          cp packages/htmdx/dist/browser.js site/
          cp packages/htmdx/dist/browser.js.map site/ || true
          cp -r packages/htmdx/storybook-static site/storybook
          touch site/.nojekyll

      # Plain git deploy: org policy requires SHA-pinned actions, and the
      # official Pages actions reference upload-artifact by tag internally.
      - name: Deploy to gh-pages branch
        run: |
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}

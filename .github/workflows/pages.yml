name: Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  YARN_NPM_REGISTRY_SERVER: https://registry.npmjs.org

jobs:
  deploy:
    name: Build and deploy examples
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: printf 'y\n' | NPQ_PKG_MGR=yarn npx --yes npq install
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build library
        run: yarn workspace @wix/htmdx build:library

      - name: Build Storybook
        run: yarn workspace @wix/htmdx build-storybook

      - name: Assemble site
        run: |
          mkdir -p site
          cp examples/*.html site/
          cp packages/htmdx/dist/browser.js site/
          cp packages/htmdx/dist/browser.js.map site/ || true
          cp -r packages/htmdx/storybook-static site/storybook

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

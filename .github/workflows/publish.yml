name: Release and publish

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  release-please:
    name: Open or finish release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['packages/htmdx--release_created'] }}
      release_sha: ${{ steps.release.outputs['packages/htmdx--sha'] }}
      tag_name: ${{ steps.release.outputs['packages/htmdx--tag_name'] }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    if: needs.release-please.outputs.release_created == 'true'
    needs: release-please
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_SHA: ${{ needs.release-please.outputs.release_sha }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      YARN_NPM_REGISTRY_SERVER: https://registry.npmjs.org

    steps:
      - name: Checkout release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: printf 'y\n' | NPQ_PKG_MGR=yarn npx --yes npq install
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify npm OIDC support
        run: |
          npm_version="$(npm --version)"
          echo "npm version: $npm_version"
          NPM_VERSION="$npm_version" node -e "const actual = process.env.NPM_VERSION.split('.').map(Number); const [major = 0, minor = 0, patch = 0] = actual; const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1))); if (!ok) { throw new Error('npm 11.5.1 or newer is required for Trusted Publishing OIDC'); }"

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Verify release tag and commit
        run: |
          version="$(node -p "require('./packages/htmdx/package.json').version")"
          head_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          if [ "$RELEASE_TAG" != "v$version" ]; then
            echo "Publish must run from tag v$version, got $RELEASE_TAG"
            exit 1
          fi
          if [ "$head_sha" != "$RELEASE_SHA" ] || [ "$tag_sha" != "$RELEASE_SHA" ]; then
            echo "Release tag, checkout, and Release Please output must point to $RELEASE_SHA"
            echo "checkout: $head_sha; $RELEASE_TAG: $tag_sha"
            exit 1
          fi

      - name: Verify version is unpublished
        run: |
          version="$(node -p "require('./packages/htmdx/package.json').version")"
          if npm view "@wix/htmdx@$version" version --registry https://registry.npmjs.org >npm-view.log 2>npm-view.err; then
            echo "@wix/htmdx@$version is already published"
            exit 1
          fi
          if ! grep -Eq "E404|404 Not Found|is not in this registry" npm-view.err; then
            cat npm-view.err
            exit 1
          fi

      - name: Validate package contents
        run: npm pack --dry-run
        working-directory: packages/htmdx

      - name: Publish package
        run: npm publish --registry https://registry.npmjs.org --provenance --access public
        working-directory: packages/htmdx

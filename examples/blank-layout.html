<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Launch Command Center — Blank Layout</title>
    <script src="./browser.js" defer></script>
  </head>
  <body>
    <!-- prettier-ignore -->
    <script type="text/htmdx">
---
layout: blank
theme: teal
---

<Card class="min-h-screen rounded-none border-0 bg-zinc-950 text-zinc-50 shadow-none">
  <CardHeader class="mx-auto w-full max-w-6xl gap-6 px-6 pt-16 md:px-12 md:pt-24">
    <Badge class="w-fit bg-teal-300 text-zinc-950 hover:bg-teal-300">Blank layout</Badge>
    <CardTitle class="max-w-4xl text-5xl font-semibold tracking-tight text-white md:text-7xl">
      Launch command center
    </CardTitle>
    <CardDescription class="max-w-2xl text-lg leading-8 text-zinc-300">
      One source stream, no generated hero, sticky header, navigation rail, or section cards.
    </CardDescription>
  </CardHeader>

  <CardContent class="mx-auto grid w-full max-w-6xl gap-12 px-6 py-16 md:grid-cols-[1.3fr_0.7fr] md:px-12 md:py-24">
    <div class="space-y-8 border-t border-zinc-700 pt-8">
      <p class="text-sm font-medium uppercase tracking-[0.24em] text-teal-300">Release path</p>
      <h2 class="text-3xl font-medium tracking-tight text-white">Three gates remain</h2>
      <Timeline>
      - **Today:** Freeze the candidate build
      - **Thursday:** Complete partner validation
      - **Friday:** Open the production rollout
      </Timeline>
    </div>

    <div class="space-y-8 border-t border-teal-300 pt-8">
      <p class="text-sm font-medium uppercase tracking-[0.24em] text-teal-300">Readiness</p>
      <p class="text-6xl font-semibold tracking-tight text-white">82%</p>
      <p class="leading-7 text-zinc-300">
        The component catalog, active theme, and Tailwind utilities remain available while the
        artifact owns its composition.
      </p>
      <Button class="bg-teal-300 text-zinc-950 hover:bg-teal-200">Review launch gates</Button>
    </div>
  </CardContent>
</Card>
    </script>
  </body>
</html>

# Component tour

Every component below renders from this page's own source block. The
machine-readable contract lives in `dist/components.json`.

## Narrative built-ins

<ExecutiveSummary>
Summarize the artifact's most important conclusion — this block is the
**ExecutiveSummary** component with a markdown body.
</ExecutiveSummary>

<Callout>
**Callout** emphasizes a note or warning. Its Markdown body supports prose,
but rejects nested component tags.
</Callout>

Shadcn bodies use composable HTMDX instead. This Card nests a Badge:

<Card class="max-w-xl">
  <CardContent>
    Release contract <Badge variant="secondary">verified</Badge>
  </CardContent>
</Card>

<SourceQuote>
"SourceQuote displays a quotation attributed in the surrounding content."
</SourceQuote>

## Overlays: hover, click, and modal

Tooltip and HoverCard open on hover; Popover and Dialog open on click. Each
renders its floating content in a portal outside the source block.

<Tooltip>
  <TooltipTrigger asChild="true">
    <Button variant="outline">Hover for a tooltip</Button>
  </TooltipTrigger>
  <TooltipContent>Portalled tooltip content.</TooltipContent>
</Tooltip>

<HoverCard>
  <HoverCardTrigger asChild="true">
    <Button variant="link">Hover for a card</Button>
  </HoverCardTrigger>
  <HoverCardContent>A richer preview shown on hover.</HoverCardContent>
</HoverCard>

<Popover>
  <PopoverTrigger asChild="true">
    <Button variant="outline">Open a popover</Button>
  </PopoverTrigger>
  <PopoverContent>Click-triggered floating panel.</PopoverContent>
</Popover>

<Dialog>
  <DialogTrigger asChild="true">
    <Button>Open a dialog</Button>
  </DialogTrigger>

      <DialogDescription>Opened by a real click; closes with the X or Escape.</DialogDescription>

    <DialogFooter>

      </DialogClose>
    </DialogFooter>
  </DialogContent>
</Dialog>

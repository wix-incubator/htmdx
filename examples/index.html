# htmdx live examples

This page is itself an htmdx artifact: one HTML file, one runtime script,
and an editable `<script type="text/htmdx">` source block. View source to
see exactly what an agent edits.

<ExecutiveSummary>
htmdx renders **declarative, agent-editable source** through React —
built-in report components plus shadcn/ui, with no code execution in the
source ("MDX minus JavaScript").
</ExecutiveSummary>

## How these pages work

<MetricStrip>
- Runtime: **browser.js**
- Components: **33**
- Source: **editable**
- Eval: **none**
</MetricStrip>

Each page loads the runtime and writes HTMDX between two script tags.
The runtime injects React, the component catalog, the shadcn/ui pack,
its theme, and Tailwind — then mounts the rendered document in place.
